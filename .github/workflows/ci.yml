name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.js   || (echo "dist/index.js missing!" && exit 1)
          test -f dist/git-tool.js  || (echo "dist/git-tool.js missing!" && exit 1)
          test -f dist/jira-tool.js || (echo "dist/jira-tool.js missing!" && exit 1)
          test -f dist/db.js        || (echo "dist/db.js missing!" && exit 1)
          echo "All dist files present ✓"
